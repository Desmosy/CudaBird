<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CudaBird Visualizer</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --danger: #ef4444;
            --game-bg: #87CEEB;
            --wire-positive: #3b82f6;
            --wire-negative: #ef4444;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-top: 0;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .container {
            display: flex;
            gap: 20px;
            background: var(--bg-panel);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        .panel {
            display: flex;
            flex-direction: column;
        }

        .panel h2 {
            color: var(--text-dim);
            text-align: center;
            font-weight: 400;
            margin-top: 0;
        }

        canvas {
            border-radius: 8px;
            background-color: #000;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        #game-canvas {
            background-image: linear-gradient(to bottom, #4c9ee3, #87CEEB);
        }

        .controls {
            margin-top: 24px;
            display: flex;
            gap: 16px;
            align-items: center;
            background: var(--bg-panel);
            padding: 16px 24px;
            border-radius: 12px;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: bold;
            font-family: monospace;
        }

        .legend {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            display: inline-block;
        }

        .color-pos {
            background-color: var(--wire-positive);
        }

        .color-neg {
            background-color: var(--wire-negative);
        }
    </style>
</head>

<body>

    <h1>CudaBird Visualizer</h1>

    <div class="container">
        <div class="panel">
            <h2>Best Network View</h2>
            <canvas id="nn-canvas" width="400" height="512"></canvas>
            <div class="legend">
                <span>
                    <div class="legend-color color-pos"></div> W > 0
                </span>
                <span>
                    <div class="legend-color color-neg"></div> W < 0</span>
            </div>
        </div>

        <div class="panel">
            <h2>Simulation</h2>
            <canvas id="game-canvas" width="288" height="512"></canvas>
        </div>
    </div>

    <div class="controls">
        <button id="btn-train" class="btn" style="background-color: #8b5cf6;">Live Train (Swarm)</button>
        <label for="file-upload" class="btn">Load CUDA Model</label>
        <input id="file-upload" type="file" accept=".txt" />

        <div class="stats" style="margin-left: 20px;">
            <div class="stat-item"><span class="stat-label">Generation</span><span id="stat-gen"
                    class="stat-value">0</span></div>
            <div class="stat-item"><span class="stat-label">Alive</span><span id="stat-alive"
                    class="stat-value">--/--</span></div>
            <div class="stat-item"><span class="stat-label">Best Score</span><span id="stat-score"
                    class="stat-value">0</span></div>
        </div>
    </div>

    <script>
        const CONFIG = {
            GAME_WIDTH: 288.0, GAME_HEIGHT: 512.0, BIRD_X: 72.0, BIRD_START_Y: 256.0, BIRD_RADIUS: 12.0,
            PIPE_WIDTH: 52.0, PIPE_GAP: 110.0, PIPE_SPEED: 2.0, PIPE_SPACING: 180.0, INITIAL_PIPE_OFFSET: 120.0,
            PIPE_MARGIN: 56.0, GRAVITY: 0.5, FLAP_STRENGTH: -8.0, FLAP_THRESHOLD: 0.5, MAX_PIPES: 5,
            INPUT_SIZE: 4, HIDDEN_SIZE: 8, OUTPUT_SIZE: 1, NETWORK_PARAM_COUNT: 49,
            POPULATION_SIZE: 250 // Browser population limit
        };

        function sigmoid(x) { return 1.0 / (1.0 + Math.exp(-x)); }
        // Gaussian approx
        function randn_bm() { let u = 0, v = 0; while (u === 0) u = Math.random(); while (v === 0) v = Math.random(); return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v); }

        function createRandomNetwork() {
            let w = new Float32Array(CONFIG.NETWORK_PARAM_COUNT);
            for (let i = 0; i < w.length; i++) w[i] = randn_bm() * 0.5;
            return w;
        }

        function runNetwork(weights, inputs) {
            let hidden = new Float32Array(CONFIG.HIDDEN_SIZE);
            let activations = new Float32Array(CONFIG.HIDDEN_SIZE);

            for (let h = 0; h < CONFIG.HIDDEN_SIZE; h++) {
                let activation = weights[32 + h]; // Bias
                for (let i = 0; i < CONFIG.INPUT_SIZE; i++) activation += weights[h * CONFIG.INPUT_SIZE + i] * inputs[i];
                activations[h] = activation;
                hidden[h] = Math.tanh(activation);
            }

            let output = weights[48]; // Output bias
            for (let h = 0; h < CONFIG.HIDDEN_SIZE; h++) output += weights[40 + h] * hidden[h];

            return { decision: sigmoid(output), nodeValues: { inputs, hiddenOut: hidden, outputOut: sigmoid(output) } };
        }

        class Bird {
            constructor(network) {
                this.y = CONFIG.BIRD_START_Y; this.vel = 0; this.alive = true; this.fitness = 0;
                this.score = 0; this.network = network; this.color = `hsl(${Math.random() * 360}, 80%, 50%)`;
                this.lastNetState = null;
            }
        }

        class GameEnv {
            constructor() {
                this.pipes = []; this.passedPipes = 0;
                let gapCtr = this.rndGap();
                for (let i = 0; i < CONFIG.MAX_PIPES; i++) {
                    this.pipes.push({ x: CONFIG.GAME_WIDTH + CONFIG.INITIAL_PIPE_OFFSET + i * CONFIG.PIPE_SPACING, gap_center_y: this.rndGap() });
                }
            }
            rndGap() { return CONFIG.PIPE_MARGIN + CONFIG.PIPE_GAP / 2 + Math.random() * (CONFIG.GAME_HEIGHT - 2 * CONFIG.PIPE_MARGIN - CONFIG.PIPE_GAP); }
            findNextPipe() {
                let bestIdx = 0, bestX = 1e9;
                for (let i = 0; i < CONFIG.MAX_PIPES; i++) {
                    if (this.pipes[i].x + CONFIG.PIPE_WIDTH >= CONFIG.BIRD_X && this.pipes[i].x < bestX) { bestIdx = i; bestX = this.pipes[i].x; }
                }
                return this.pipes[bestIdx];
            }
            advance() {
                let rightmost = this.pipes[0].x;
                for (let p of this.pipes) {
                    p.x -= CONFIG.PIPE_SPEED;
                    if (p.x > rightmost) rightmost = p.x;
                    if (p.x === CONFIG.BIRD_X) this.passedPipes++;
                }
                for (let p of this.pipes) {
                    if (p.x + CONFIG.PIPE_WIDTH < 0) { p.x = rightmost + CONFIG.PIPE_SPACING; p.gap_center_y = this.rndGap(); rightmost = p.x; }
                }
            }
        }

        // Global State
        let mode = 'REPLAY'; // 'REPLAY' or 'TRAINING'
        let genCount = 0;
        let birds = [];
        let env = new GameEnv();
        let bestBirdStats = { displayNet: null, netState: null, score: 0 };

        function initTraining() {
            mode = 'TRAINING'; genCount = 1; birds = [];
            for (let i = 0; i < CONFIG.POPULATION_SIZE; i++) birds.push(new Bird(createRandomNetwork()));
            env = new GameEnv();
            document.getElementById('stat-gen').innerText = genCount;
        }

        function evolve() {
            // Sort logic
            birds.sort((a, b) => b.fitness - a.fitness);
            let nextGen = [];
            // Elite
            for (let i = 0; i < 4; i++) {
                let b = new Bird(new Float32Array(birds[i].network));
                nextGen.push(b);
            }
            // Mutate
            while (nextGen.length < CONFIG.POPULATION_SIZE) {
                let parent = birds[Math.floor(Math.random() * 20)]; // top 20
                let w = new Float32Array(parent.network);
                for (let j = 0; j < w.length; j++) if (Math.random() < 0.1) w[j] += randn_bm() * 0.3;
                nextGen.push(new Bird(w));
            }
            birds = nextGen;
            env = new GameEnv();
            genCount++; document.getElementById('stat-gen').innerText = genCount;
        }

        function simulateStep() {
            let aliveCount = 0;
            const nextPipe = env.findNextPipe();
            let generationBest = null;

            for (let b of birds) {
                if (!b.alive) continue;
                aliveCount++;

                let inputs = new Float32Array([
                    (b.y / CONFIG.GAME_HEIGHT) * 2 - 1, b.vel / 10,
                    ((nextPipe.x - CONFIG.BIRD_X) / CONFIG.GAME_WIDTH) * 2 - 1,
                    (nextPipe.gap_center_y / CONFIG.GAME_HEIGHT) * 2 - 1
                ]);

                let netOut = runNetwork(b.network, inputs);
                b.lastNetState = netOut;
                if (netOut.decision > CONFIG.FLAP_THRESHOLD) b.vel = CONFIG.FLAP_STRENGTH;

                b.vel += CONFIG.GRAVITY; b.y += b.vel;

                // Physics logic matching backend
                b.fitness += 1;
                if (nextPipe.x === CONFIG.BIRD_X) { b.score++; b.fitness += 250; }

                let outB = (b.y - CONFIG.BIRD_RADIUS) < 0 || (b.y + CONFIG.BIRD_RADIUS) > CONFIG.GAME_HEIGHT;
                let col = false;
                let pL = nextPipe.x, pR = nextPipe.x + CONFIG.PIPE_WIDTH;
                if ((CONFIG.BIRD_X + CONFIG.BIRD_RADIUS) >= pL && (CONFIG.BIRD_X - CONFIG.BIRD_RADIUS) <= pR) {
                    if ((b.y - CONFIG.BIRD_RADIUS) < nextPipe.gap_center_y - CONFIG.PIPE_GAP / 2 ||
                        (b.y + CONFIG.BIRD_RADIUS) > nextPipe.gap_center_y + CONFIG.PIPE_GAP / 2) col = true;
                }

                if (outB || col) b.alive = false;
                if (b.alive && (!generationBest || b.fitness > generationBest.fitness)) generationBest = b;
            }

            env.advance();

            let bestOverallScore = Math.max(...birds.map(b => b.score));
            document.getElementById('stat-alive').innerText = `${aliveCount}/${birds.length}`;
            document.getElementById('stat-score').innerText = bestOverallScore;

            if (generationBest) {
                bestBirdStats.displayNet = generationBest.network;
                bestBirdStats.netState = generationBest.lastNetState;
            }

            if (aliveCount === 0 && mode === 'TRAINING') {
                evolve();
            } else if (aliveCount === 0 && mode === 'REPLAY') {
                // restart replay
                let replayNet = new Float32Array(birds[0].network);
                birds = [new Bird(replayNet)];
                env = new GameEnv();
            }
        }

        const gameCtx = document.getElementById('game-canvas').getContext('2d');
        const nnCtx = document.getElementById('nn-canvas').getContext('2d');

        function drawGame() {
            gameCtx.clearRect(0, 0, CONFIG.GAME_WIDTH, CONFIG.GAME_HEIGHT);

            gameCtx.fillStyle = '#10b981';
            for (let p of env.pipes) {
                let ty = p.gap_center_y - CONFIG.PIPE_GAP / 2, by = p.gap_center_y + CONFIG.PIPE_GAP / 2;
                gameCtx.fillRect(p.x, 0, CONFIG.PIPE_WIDTH, ty); gameCtx.fillRect(p.x - 4, ty - 20, CONFIG.PIPE_WIDTH + 8, 20);
                gameCtx.fillRect(p.x, by, CONFIG.PIPE_WIDTH, CONFIG.GAME_HEIGHT - by); gameCtx.fillRect(p.x - 4, by, CONFIG.PIPE_WIDTH + 8, 20);
            }

            // Draw all dead as shadows
            for (let b of birds) {
                if (!b.alive && mode === 'TRAINING') {
                    gameCtx.beginPath(); gameCtx.arc(CONFIG.BIRD_X, b.y, CONFIG.BIRD_RADIUS, 0, Math.PI * 2);
                    gameCtx.fillStyle = 'rgba(239,68,68,0.1)'; gameCtx.fill();
                }
            }
            // Draw alive
            for (let b of birds) {
                if (b.alive) {
                    gameCtx.beginPath(); gameCtx.arc(CONFIG.BIRD_X, b.y, CONFIG.BIRD_RADIUS, 0, Math.PI * 2);
                    gameCtx.fillStyle = mode === 'REPLAY' ? '#f1c40f' : b.color; gameCtx.fill();
                    gameCtx.lineWidth = 1; gameCtx.strokeStyle = '#000'; gameCtx.stroke();
                }
            }
        }

        function drawNetwork() {
            let w = bestBirdStats.displayNet, s = bestBirdStats.netState;
            nnCtx.clearRect(0, 0, 400, 512);
            const nodes = [CONFIG.INPUT_SIZE, CONFIG.HIDDEN_SIZE, CONFIG.OUTPUT_SIZE];
            const X = [80, 200, 320]; let coords = [[], [], []];
            for (let l = 0; l < 3; l++) {
                let spacing = 412 / Math.max(1, nodes[l] - 1 || 1);
                let start = 50 + (412 - spacing * (nodes[l] - 1)) / 2;
                for (let i = 0; i < nodes[l]; i++) coords[l].push({ x: X[l], y: start + i * spacing });
            }

            if (w) {
                for (let i = 0; i < CONFIG.INPUT_SIZE; i++) for (let h = 0; h < CONFIG.HIDDEN_SIZE; h++) drawW(coords[0][i], coords[1][h], w[h * CONFIG.INPUT_SIZE + i]);
                for (let h = 0; h < CONFIG.HIDDEN_SIZE; h++) drawW(coords[1][h], coords[2][0], w[40 + h]);
            }

            const vals = s ? [s.nodeValues.inputs, s.nodeValues.hiddenOut, [s.nodeValues.outputOut]] : null;
            const lbls = [["Y", "Vy", "dX", "dY"], [], ["Flap"]];
            for (let l = 0; l < 3; l++) {
                for (let i = 0; i < nodes[l]; i++) {
                    let p = coords[l][i], val = vals ? vals[l][i] : 0, int = l == 2 ? val : (val + 1) / 2;
                    nnCtx.beginPath(); nnCtx.arc(p.x, p.y, 16, 0, Math.PI * 2);
                    nnCtx.fillStyle = l == 2 && val > CONFIG.FLAP_THRESHOLD ? '#10b981' : `rgb(${int * 255},${int * 255},${int * 255})`;
                    nnCtx.fill(); nnCtx.lineWidth = 2; nnCtx.strokeStyle = '#334155'; nnCtx.stroke();
                    if (lbls[l][i]) { nnCtx.fillStyle = '#94a3b8'; nnCtx.font = '12px sans'; nnCtx.textAlign = l === 0 ? 'right' : 'left'; nnCtx.fillText(lbls[l][i], p.x + (l ? 24 : -24), p.y + 4); }
                }
            }
        }

        function drawW(p1, p2, w) {
            nnCtx.beginPath(); nnCtx.moveTo(p1.x, p1.y); nnCtx.lineTo(p2.x, p2.y);
            const mag = Math.abs(w); nnCtx.lineWidth = Math.min(6, mag * 4);
            nnCtx.strokeStyle = w > 0 ? `rgba(59,130,246,${Math.min(1, mag * 1.5)})` : `rgba(239,68,68,${Math.min(1, mag * 1.5)})`; nnCtx.stroke();
        }

        function loop() {
            simulateStep();
            drawGame();
            drawNetwork();
            requestAnimationFrame(loop);
        }

        document.getElementById('btn-train').onclick = () => { initTraining(); };
        document.getElementById('file-upload').addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = e => {
                let lines = e.target.result.trim().split('\n'), w = new Float32Array(CONFIG.NETWORK_PARAM_COUNT), idx = 0;
                let pGen = 0;
                for (let l of lines) { l = l.trim(); if (l.includes('=')) { let p = l.split('='); if (p[0] == 'generation') pGen = p[1]; } else if (l) w[idx++] = parseFloat(l); }
                mode = 'REPLAY'; genCount = pGen; document.getElementById('stat-gen').innerText = genCount;
                birds = [new Bird(w)]; env = new GameEnv();
            };
            reader.readAsText(e.target.files[0]);
        });

        initTraining();
        loop();
    </script>
</body>

</html>
